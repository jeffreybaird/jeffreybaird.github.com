// ---- scoring: loadings-weighted mean per axis ----
function scoreAxes(answers) {
  // answers: array (len Q) of chosen option index or null
  const num = [0, 0, 0, 0], den = [0, 0, 0, 0];
  answers.forEach((oi, qIdx) => {
    if (oi == null) return;
    const q = Q[qIdx], opt = q.a[oi];
    for (let k = 0; k < 4; k++) {
      const L = q.load[k], val = opt.v[k];
      if (L > 0 && val != null) { num[k] += L * val; den[k] += L; }
    }
  });
  return num.map((n, k) => (den[k] > 0 ? n / den[k] : 5.0));
}

// ---- team centroid (mean of all team vectors, per axis) ----
const CENTROID = AXES.map((_, k) =>
  TEAM_NAMES.reduce((s, n) => s + TEAMS[n][k], 0) / TEAM_NAMES.length
);
// user-vector centrality amplification: stretch the user's vector outward from the centroid
// before matching, so moderate answers stop collapsing onto the centre team. 1 = off.
const AMPLIFY = 2.5;

// slider-weighted distance matching (nearest team). sim = 1/(1+dist) so higher = better,
// keeping all downstream leader / gap / chooser-threshold logic unchanged.
function rankTeams(vec, weights) {
  const wsum = weights.reduce((s, x) => s + x, 0) || 1;
  const w = weights.map((x) => x / wsum);
  const u = vec.map((x, k) => {
    const a = CENTROID[k] + (x - CENTROID[k]) * AMPLIFY;
    return Math.max(0, Math.min(10, a));
  });
  return TEAM_NAMES
    .map((name) => {
      const t = TEAMS[name];
      const dist = Math.sqrt(w.reduce((s, wk, k) => s + wk * (u[k] - t[k]) * (u[k] - t[k]), 0));
      return { name, dist, sim: 1 / (1 + dist) };
    })
    .sort((a, b) => b.sim - a.sim);
}

function LiveRanking({ vec, weights, basePos, started, compare }) {
  const rank = rankTeams(vec, weights);
  const leader = rank[0].sim;

  // compare mode: show equal-weights similarity as a fixed reference next to the live weighted value,
  // with ▲▼ = how the team moved vs its equal-weights position. Updates live as weights change.
  if (compare) {
    const eqRank = rankTeams(vec, [5, 5, 5, 5]);
    const eqSim = {}, eqPos = {};
    eqRank.forEach((r, idx) => { eqSim[r.name] = r.sim; eqPos[r.name] = idx; });
    return (
      <div style={{ display: "grid", gap: 3 }}>
        <div style={{ display: "grid", gridTemplateColumns: "18px 1fr 44px 44px 30px", alignItems: "center", gap: 8, padding: "0 8px 4px" }}>
          <span />
          <span style={{ ...mono, fontSize: 8.5, letterSpacing: 0.5, color: C.amberDim, textTransform: "uppercase" }}>team</span>
          <span style={{ ...mono, fontSize: 8.5, letterSpacing: 0.5, color: C.amberDim, textTransform: "uppercase", textAlign: "right" }}>equal</span>
          <span style={{ ...mono, fontSize: 8.5, letterSpacing: 0.5, color: C.amberDim, textTransform: "uppercase", textAlign: "right" }}>yours</span>
          <span />
        </div>
        {rank.map((r, i) => {
          const moved = eqPos[r.name] - i; // + = climbed vs equal-weights
          let cue = "·", cueColor = C.chalkDim;
          if (moved > 0) { cue = `▲${moved}`; cueColor = C.lime; }
          else if (moved < 0) { cue = `▼${-moved}`; cueColor = "#E06B6B"; }
          const inChooser = i > 0 && (r.dist - rank[0].dist) < CHOOSER_THRESHOLD;
          return (
            <div key={r.name} style={{ display: "grid", gridTemplateColumns: "18px 1fr 44px 44px 30px", alignItems: "center", gap: 8,
              padding: "3px 8px", borderRadius: 6,
              background: i === 0 ? "rgba(240,178,62,.14)" : (inChooser ? "rgba(91,217,138,.07)" : "transparent") }}>
              <span style={{ ...mono, fontSize: 11, color: C.chalkDim }}>{i + 1}</span>
              <span style={{ fontSize: 13, color: i === 0 ? C.amber : C.chalk }}>{r.name}</span>
              <span style={{ ...mono, fontSize: 10.5, color: C.chalkDim, textAlign: "right" }}>{eqSim[r.name].toFixed(2)}</span>
              <span style={{ ...mono, fontSize: 10.5, color: i === 0 ? C.amber : C.chalk, textAlign: "right" }}>{r.sim.toFixed(2)}</span>
              <span style={{ ...mono, fontSize: 10, color: cueColor, textAlign: "right" }}>{cue}</span>
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div style={{ display: "grid", gap: 3 }}>
      {rank.map((r, i) => {
        let cue = "", cueColor = C.chalkDim;
        if (started && basePos[r.name] !== undefined) {
          const delta = basePos[r.name] - i;
          if (delta > 0) { cue = `▲${delta}`; cueColor = C.lime; }
          else if (delta < 0) { cue = `▼${-delta}`; cueColor = "#E06B6B"; }
          else { cue = "·"; }
        }
        const gap = i === 0 ? "leader" : `+${(r.dist - rank[0].dist).toFixed(2)}`;
        const inChooser = i > 0 && (r.dist - rank[0].dist) < CHOOSER_THRESHOLD;
        return (
          <div key={r.name} style={{ display: "grid", gridTemplateColumns: "18px 1fr 48px 34px", alignItems: "center", gap: 8,
            padding: "3px 8px", borderRadius: 6,
            background: i === 0 ? "rgba(240,178,62,.14)" : (inChooser ? "rgba(91,217,138,.07)" : "transparent") }}>
            <span style={{ ...mono, fontSize: 11, color: C.chalkDim }}>{i + 1}</span>
            <span style={{ fontSize: 13, color: i === 0 ? C.amber : C.chalk }}>{r.name}</span>
            <span style={{ ...mono, fontSize: 10.5, color: C.chalkDim, textAlign: "right" }}>{gap}</span>
            <span style={{ ...mono, fontSize: 10.5, color: cueColor, textAlign: "right" }}>{cue}</span>
          </div>
        );
      })}
    </div>
  );
}

      background: `linear-gradient(160deg, ${C.pitch2}, #071410)`, border: `1.5px solid ${C.line}`,
      display: "flex", alignItems: "center", justifyContent: "center",
      boxShadow: `inset 0 1px 0 rgba(255,255,255,.04), 0 8px 24px ${C.shadow}`,
    }}>
      <span style={{ ...disp, fontWeight: 900, fontSize: size * 0.32, color: C.amber, letterSpacing: 1 }}>{initials}</span>
    </div>
  );
}

function App() {
  const [stage, setStage] = useState("intro"); // intro | quiz | sliders | result
  const [qi, setQi] = useState(0);
  const [answers, setAnswers] = useState(Q.map(() => null));
  const [weights, setWeights] = useState(SLIDERS.map(() => 5));
  const [coach, setCoach] = useState(false);
  const [result, setResult] = useState(null);
  const [chosen, setChosen] = useState(0);
  const [basePos, setBasePos] = useState({});
  const [history, setHistory] = useState([]); // stack of {qi, answers} for Back within quiz

  const vec = scoreAxes(answers);

  function chooseOption(oi) {
    const na = answers.slice();
    na[qi] = oi;
    setHistory((h) => [...h, { qi, answers: answers.slice(), basePos: { ...basePos } }]);
    // fix baseline once, after first answer, using equal weights for the live board
    if (Object.keys(basePos).length === 0) {
      const base = {};
      rankTeams(scoreAxes(na), SLIDERS.map(() => 5)).forEach((r, idx) => { base[r.name] = idx; });
      setBasePos(base);
    }
    setAnswers(na);
    if (qi < Q.length - 1) setQi(qi + 1);
    else setStage("sliders");
  }

  function finish() {
    const rank = rankTeams(scoreAxes(answers), weights);
    const candidates = rank.filter((r, idx) => idx === 0 || r.dist - rank[0].dist < CHOOSER_THRESHOLD).slice(0, MAX_CHOICES);
    setResult({ rank, candidates, gap: rank[1].dist - rank[0].dist });
    setChosen(0);
    setStage("result");
  }

  function goBack() {
    if (stage === "result") { setStage("sliders"); return; }
    if (stage === "sliders") { setStage("quiz"); setQi(Q.length - 1); return; }
    if (history.length === 0) return;
    const prev = history[history.length - 1];
    setHistory((h) => h.slice(0, -1));
    setAnswers(prev.answers); setBasePos(prev.basePos); setQi(prev.qi);
  }

  function reset() {
    setStage("intro"); setQi(0); setAnswers(Q.map(() => null));
    setWeights(SLIDERS.map(() => 5)); setResult(null); setChosen(0); setBasePos({}); setHistory([]);
  }

  const shell = {
    minHeight: "100vh", background: `radial-gradient(1200px 600px at 50% -10%, ${C.pitch2}, ${C.pitch} 60%)`,
    color: C.chalk, ...body, padding: "28px 18px 64px", backgroundAttachment: "fixed",
  };

  return (
    <div style={shell}>
      <style>{FONTS}</style>
      <style>{`
        * { box-sizing: border-box; }
        button { cursor: pointer; font-family: inherit; }
        @media (prefers-reduced-motion: reduce){ * { transition:none !important; animation:none !important; } }
        .qbtn:hover{ border-color:${C.amber} !important; transform:translateY(-1px); }
        .qbtn:focus-visible{ outline:2px solid ${C.lime}; outline-offset:2px; }
        .altchip:hover{ border-color:${C.amber} !important; }
        input[type=range]{ -webkit-appearance:none; appearance:none; height:6px; border-radius:999px;
          background:${C.line}; outline:none; }
        input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:20px; height:20px;
          border-radius:50%; background:${C.amber}; border:2px solid #1a1305; cursor:pointer; }
        input[type=range]::-moz-range-thumb{ width:20px; height:20px; border-radius:50%; background:${C.amber};
          border:2px solid #1a1305; cursor:pointer; }
        input[type=range]:focus-visible{ outline:2px solid ${C.lime}; outline-offset:4px; }
      `}</style>

      <div style={{ maxWidth: 620, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 22 }}>
          <div style={{ ...mono, fontSize: 11, letterSpacing: 2, color: C.chalkDim, textTransform: "uppercase" }}>Matchday · Find Your Club</div>
          <div style={{ display: "flex", gap: 8 }}>
            {stage !== "intro" && (
              <button onClick={reset} title="Restart from the first question" style={{
                ...mono, fontSize: 10, letterSpacing: 1, textTransform: "uppercase",
                background: "transparent", color: C.chalkDim,
                border: `1px solid ${C.line}`, borderRadius: 999, padding: "5px 10px",
              }}>↺ Restart</button>
            )}
            <button onClick={() => setCoach((c) => !c)} style={{
              ...mono, fontSize: 10, letterSpacing: 1, textTransform: "uppercase",
              background: coach ? C.amber : "transparent", color: coach ? "#1a1305" : C.amberDim,
              border: `1px solid ${coach ? C.amber : C.amberDim}`, borderRadius: 999, padding: "5px 10px",
            }}>Coach's view</button>
          </div>
        </div>

        {stage === "intro" && (
          <div>
            <div style={{ ...mono, fontSize: 12, color: C.lime, letterSpacing: 1, marginBottom: 10 }}>15 questions, then 4 dials</div>
            <h1 style={{ ...disp, fontWeight: 900, fontSize: 52, lineHeight: 0.95, margin: "0 0 14px", letterSpacing: -1 }}>
              FIND THE CLUB<br />YOU SHOULD<br /><span style={{ color: C.amber }}>ACTUALLY PICK.</span>
            </h1>
            <p style={{ color: C.chalkDim, fontSize: 16, lineHeight: 1.5, maxWidth: 470, margin: "0 0 26px" }}>
              No team of your own yet? Answer a handful of everyday questions — about how you live, what you value, who annoys you — then tell us how much each thing matters. We'll match you to a Premier League side, warts and all.
            </p>
            <button onClick={() => setStage("quiz")} style={{
              ...disp, fontWeight: 800, fontSize: 17, letterSpacing: 0.5, textTransform: "uppercase",
              background: C.amber, color: "#1a1305", border: "none", borderRadius: 10, padding: "14px 30px", boxShadow: `0 8px 24px ${C.shadow}`,
            }}>Kick off →</button>
          </div>
        )}

        {stage === "quiz" && (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
                {(qi > 0 || history.length > 0) && (
                  <button onClick={goBack} style={{
                    ...mono, fontSize: 11, letterSpacing: 0.5, textTransform: "uppercase",
                    background: "transparent", color: C.chalkDim, border: "none", padding: 0,
                  }}>← Back</button>
                )}
                <span style={{ ...mono, fontSize: 12, color: C.amber, letterSpacing: 1 }}>{String(qi + 1).padStart(2, "0")} <span style={{ color: C.amberDim }}>/ {Q.length}</span></span>
              </div>
              <span style={{ ...mono, fontSize: 11, color: C.chalkDim }}>{Math.round((qi / Q.length) * 100)}% played</span>
            </div>
            <div style={{ height: 4, background: "#0c2417", borderRadius: 999, marginBottom: 24, overflow: "hidden", border: `1px solid ${C.line}` }}>
              <div style={{ width: `${(qi / Q.length) * 100}%`, height: "100%", background: C.lime, transition: "width .4s ease" }} />
            </div>
            <h2 style={{ ...disp, fontWeight: 800, fontSize: 25, lineHeight: 1.14, margin: "0 0 20px" }}>{Q[qi].t}</h2>
            {coach && (
              <div style={{ ...mono, fontSize: 10.5, letterSpacing: 0.5, color: C.amberDim, margin: "-10px 0 16px", display: "flex", gap: 10, flexWrap: "wrap" }}>
                <span style={{ textTransform: "uppercase", letterSpacing: 1 }}>Loadings:</span>
                {AXES.map((ax, k) => (
                  <span key={ax} style={{ color: Q[qi].load[k] > 0 ? C.amber : "#3a5140" }}>
                    {ax[0]}·{Q[qi].load[k]}
                  </span>
                ))}
              </div>
            )}
            <div style={{ display: "grid", gap: 10 }}>
              {Q[qi].a.map((opt, i) => (
                <button key={i} className="qbtn" onClick={() => chooseOption(i)} style={{
                  textAlign: "left", background: answers[qi] === i ? "rgba(240,178,62,.12)" : C.pitch2,
                  color: C.chalk, border: `1px solid ${answers[qi] === i ? C.amber : C.line}`,
                  borderRadius: 10, padding: "15px 16px", fontSize: 15.5, lineHeight: 1.35,
                  transition: "border-color .15s, transform .15s", display: "flex", gap: 12, alignItems: "flex-start",
                }}>
                  <span style={{ ...mono, fontSize: 13, color: C.amber, flex: "0 0 auto", marginTop: 1 }}>{"abcd"[i]}</span>
                  <span style={{ flex: 1 }}>{opt.l}</span>
                  {coach && (
                    <span style={{ ...mono, fontSize: 10.5, color: C.chalkDim, flex: "0 0 auto", marginTop: 2, textAlign: "right", whiteSpace: "nowrap" }}>
                      {AXES.map((ax, k) => (
                        Q[qi].load[k] > 0
                          ? <span key={ax} style={{ marginLeft: 7, color: opt.v[k] == null ? "#3a5140" : C.chalk }}>
                              {ax[0]}{opt.v[k] == null ? "—" : opt.v[k]}
                            </span>
                          : null
                      ))}
                    </span>
                  )}
                </button>
              ))}
            </div>
            {coach && (
              <div style={{ marginTop: 24, padding: 14, borderRadius: 10, border: `1px dashed ${C.amberDim}`, background: "rgba(0,0,0,.2)" }}>
                <div style={{ ...mono, fontSize: 10, letterSpacing: 1, color: C.amberDim, textTransform: "uppercase", marginBottom: 10, display: "flex", justifyContent: "space-between" }}>
                  <span>Live ranking · equal weights</span>
                  <span style={{ color: C.chalkDim }}>gap · total move</span>
                </div>
                <LiveRanking vec={vec} weights={SLIDERS.map(() => 5)} basePos={basePos} started={history.length > 0} />
                <div style={{ ...mono, fontSize: 10, letterSpacing: 1, color: C.amberDim, textTransform: "uppercase", margin: "16px 0 10px" }}>Live trait board</div>
                <TraitBoard vec={vec} />
              </div>
            )}
          </div>
        )}

        {stage === "sliders" && (
          <div>
            <button onClick={goBack} style={{
              ...mono, fontSize: 11, letterSpacing: 0.5, textTransform: "uppercase",
              background: "transparent", color: C.chalkDim, border: "none", padding: 0, marginBottom: 16,
            }}>← Back</button>
            <div style={{ ...mono, fontSize: 12, color: C.lime, letterSpacing: 1, marginBottom: 10 }}>Last bit · what matters to you</div>
            <h2 style={{ ...disp, fontWeight: 800, fontSize: 27, lineHeight: 1.05, margin: "0 0 8px" }}>How much does each thing count?</h2>
            <p style={{ color: C.chalkDim, fontSize: 14.5, lineHeight: 1.5, margin: "0 0 26px" }}>
              These are relative priorities — sliding everything to the top is the same as leaving everything in the middle. Only the balance between them changes your match.
            </p>
            <div style={{ display: "grid", gap: 22 }}>
              {SLIDERS.map((s, i) => (
                <div key={s.ax}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                    <span style={{ ...disp, fontWeight: 700, fontSize: 16 }}>{s.q}</span>
                    <span style={{ ...mono, fontSize: 13, color: C.amber }}>{weights[i]}</span>
                  </div>
                  <input type="range" min="1" max="10" value={weights[i]} style={{ width: "100%" }}
                    onChange={(e) => { const w = weights.slice(); w[i] = +e.target.value; setWeights(w); }} />
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 5 }}>
                    <span style={{ ...mono, fontSize: 10, color: C.chalkDim }}>{s.lo}</span>
                    <span style={{ ...mono, fontSize: 10, color: C.chalkDim, textAlign: "right" }}>{s.hi}</span>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 26, padding: 16, borderRadius: 12, border: `1px solid ${C.line}`, background: "rgba(0,0,0,.2)" }}>
              <div style={{ ...mono, fontSize: 10, letterSpacing: 1, color: C.amberDim, textTransform: "uppercase", marginBottom: 12 }}>Your four attributes</div>
              <TraitBoard vec={vec} />
              <div style={{ ...mono, fontSize: 10, letterSpacing: 1, color: C.amberDim, textTransform: "uppercase", margin: "18px 0 4px", display: "flex", justifyContent: "space-between" }}>
                <span>Ranking · equal vs your weights</span>
                <span style={{ color: C.chalkDim }}>▲▼ move vs equal</span>
              </div>
              <LiveRanking vec={vec} weights={weights} compare={true} />
            </div>
            <button onClick={finish} style={{
              ...disp, fontWeight: 800, fontSize: 17, letterSpacing: 0.5, textTransform: "uppercase", marginTop: 26,
              background: C.amber, color: "#1a1305", border: "none", borderRadius: 10, padding: "14px 30px", boxShadow: `0 8px 24px ${C.shadow}`,
            }}>Show my club →</button>
          </div>
        )}

        {stage === "result" && result && (() => {
          const pick = result.candidates[chosen];
          const others = result.candidates.filter((_, i) => i !== chosen);
          const hasAlts = result.candidates.length > 1;
          return (
            <div>
              <div style={{ ...mono, fontSize: 12, color: C.lime, letterSpacing: 1, marginBottom: 14 }}>
                {hasAlts ? "Full time · it's close — take your pick" : "Full time · your club"}
              </div>
              <div style={{ display: "flex", gap: 18, alignItems: "center", marginBottom: 18 }}>
                <Badge name={pick.name} />
                <h1 style={{ ...disp, fontWeight: 900, fontSize: 38, lineHeight: 0.95, margin: 0, letterSpacing: -1 }}>{pick.name}</h1>
              </div>
              <p style={{ fontSize: 17, lineHeight: 1.5, color: C.chalk, margin: "0 0 24px" }}>{FLAVOR[pick.name]}</p>

              {hasAlts && (
                <div style={{ marginBottom: 26 }}>
                  <div style={{ ...mono, fontSize: 11, letterSpacing: 1, color: C.chalkDim, textTransform: "uppercase", marginBottom: 10 }}>Or maybe you're more…</div>
                  <div style={{ display: "grid", gap: 8 }}>
                    {others.map((o) => (
                      <button key={o.name} className="altchip" onClick={() => setChosen(result.candidates.indexOf(o))} style={{
                        textAlign: "left", background: C.pitch2, color: C.chalk, border: `1px solid ${C.line}`,
                        borderRadius: 10, padding: "12px 14px", transition: "border-color .15s", display: "flex", gap: 12, alignItems: "center",
                      }}>
                        <Badge name={o.name} size={40} />
                        <span>
                          <span style={{ ...disp, fontWeight: 800, fontSize: 16 }}>{o.name}</span>
                          <span style={{ display: "block", color: C.chalkDim, fontSize: 12.5, lineHeight: 1.3, marginTop: 2 }}>
                            {FLAVOR[o.name].split(". ")[0]}.
                          </span>
                        </span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={goBack} style={{
                  ...disp, fontWeight: 800, fontSize: 15, textTransform: "uppercase",
                  background: "transparent", color: C.chalkDim, border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 24px",
                }}>← Adjust dials</button>
                <button onClick={reset} style={{
                  ...disp, fontWeight: 800, fontSize: 15, textTransform: "uppercase",
                  background: "transparent", color: C.amber, border: `1px solid ${C.amber}`, borderRadius: 10, padding: "12px 24px",
                }}>Play again ↺</button>
              </div>

              {coach && (
                <div style={{ marginTop: 30, padding: 16, borderRadius: 12, border: `1px dashed ${C.amberDim}`, background: "rgba(0,0,0,.22)" }}>
                  <div style={{ ...mono, fontSize: 10, letterSpacing: 1, color: C.amberDim, textTransform: "uppercase", marginBottom: 12 }}>
                    Similarity table · top-2 gap {result.gap.toFixed(3)} · {result.candidates.length} candidate{result.candidates.length > 1 ? "s" : ""} within {CHOOSER_THRESHOLD}
                  </div>
                  <div style={{ display: "grid", gap: 3, marginBottom: 18 }}>
                    {result.rank.slice(0, 10).map((r, i) => {
                      const inPool = result.candidates.some((c) => c.name === r.name);
                      return (
                        <div key={r.name} style={{ display: "grid", gridTemplateColumns: "22px 1fr 56px", alignItems: "center", gap: 8,
                          padding: "4px 8px", borderRadius: 6, background: inPool ? "rgba(240,178,62,.12)" : "transparent" }}>
                          <span style={{ ...mono, fontSize: 11, color: C.chalkDim }}>{i + 1}</span>
                          <span style={{ fontSize: 13.5, color: inPool ? C.amber : C.chalk }}>{r.name}</span>
                          <span style={{ ...mono, fontSize: 11, color: C.chalkDim, textAlign: "right" }}>{r.sim.toFixed(3)}</span>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ ...mono, fontSize: 10, letterSpacing: 1, color: C.amberDim, textTransform: "uppercase", marginBottom: 10 }}>Your vector · weights [{weights.join(", ")}]</div>
                  <TraitBoard vec={vec} />
                </div>
              )}
            </div>
          );
        })()}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
<script>
  (function () {
    function fail(err) {
      document.getElementById("root").innerHTML =
        '<div style="color:#EDF1EA;font-family:monospace;padding:40px;max-width:600px;margin:0 auto;">' +
        '<b>Something went wrong loading the quiz.</b><br/><br/>' +
        'This page needs an internet connection (it loads React from a CDN). ' +
        'If you are online and still see this, try a hard refresh.<br/><br/>' +
        '<span style="color:#9DB0A2;font-size:12px;">' + String(err) + '</span></div>';
      console.error(err);
    }
    function boot() {
      // wait until all three CDN libraries are actually available, then compile + run
      if (typeof Babel === "undefined" || typeof React === "undefined" || typeof ReactDOM === "undefined") {
        return fail(new Error("Libraries did not load (React/ReactDOM/Babel). Check your connection or try again."));
      }
      try {
        var src = document.getElementById("app-src").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        (0, eval)(out);
      } catch (err) {
        fail(err);
      }
    }
    // run after the full page (including the CDN scripts above) has loaded
    if (document.readyState === "complete") {
      boot();
    } else {
      window.addEventListener("load", boot);
    }
  })();
</script>
</body>
</html>
